site_name: ADLS — Prüfungszusammenfassungen
site_description: Prüfungszusammenfassungen ZHAW Applied Digital Life Science
site_author: Javier Martinez Alvarez

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Hellmodus
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: de

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Startseite: index.md
  - 4. Semester:
    - Übersicht: 4-semester/index.md
    - Neural Networks:
      - Übersicht: 4-semester/neune/index.md
      - 1. Perceptron: 4-semester/neune/01-perceptron.md
      - 2. MLP & Backpropagation: 4-semester/neune/02-mlp.md
      - 3. Training Pipeline: 4-semester/neune/03-training.md
      - 4. CNN: 4-semester/neune/04-cnn.md
      - 5. RNN: 4-semester/neune/05-rnn.md
      - 6. NLP: 4-semester/neune/06-nlp.md
      - Prüfungstipps: 4-semester/neune/pruefungstipps.md
    - Organische Chemie:
      - Übersicht: 4-semester/orgchem/index.md
